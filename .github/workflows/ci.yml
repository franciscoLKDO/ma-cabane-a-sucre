on:
  workflow_dispatch:
    inputs:
        config-path:
            required: true
            type: string
        personal_access_token:
            required: true
            type: string
    
jobs:
  example-job:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository to the runner
        uses: actions/checkout@v6
      - name: Run a script
        uses: github.com/franciscoLKDO/ci-automate@main
        with:
          who-to-greet: ${{inputs.personal_access_token}}

